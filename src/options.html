<!DOCTYPE html>
<html>
<head>
  <title>PK Sticky Notes Options</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      min-width: 400px;
    }
    
    .option {
      margin: 15px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    h1 {
      font-size: 1.3em;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>PK Sticky Notes Options</h1>
  
  <div class="option">
    <input type="checkbox" id="showFloatingButton" checked>
    <label for="showFloatingButton">Show Floating Action Button</label>
  </div>
  
  <div class="option">
    <input type="checkbox" id="savePosition" checked>
    <label for="savePosition">Save Notes Position</label>
  </div>
  
  <button id="save">Save Settings</button>
  <div id="status" style="margin-top: 10px; color: green; display: none;"></div>

  <script src="options.js"></script>
</body>
</html>
